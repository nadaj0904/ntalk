<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:if="${_csrf}" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:if="${_csrf}" th:content="${_csrf.headerName}"/>
    <title>메세지 관리 - 모리아스토리채널 시스템</title>

    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    
    <link rel="stylesheet" href="https://uicdn.toast.com/grid/latest/tui-grid.min.css" />
    <script src="https://uicdn.toast.com/grid/latest/tui-grid.min.js"></script>

    <link rel="stylesheet" href="/css/index.css">
    <link rel="stylesheet" href="/css/custAdmin.css">
</head>
<body>

    <aside>
        <div class="logo-area">
            <i class="ph-fill ph-shield-check" style="color: var(--primary-color);"></i>
            <span style="margin-left: 10px;">모리아스토리채널</span>
        </div>
        <nav class="nav-menu">
            <a href="/index" class="nav-item">
                <i class="ph ph-squares-four"></i>
                메인 대시보드 (Home)
            </a>
            <a href="/send" class="nav-item">
                <i class="ph ph-paper-plane-tilt"></i>
                바로 발송
            </a>
            <a href="/channelSend" class="nav-item">
                <i class="ph ph-chat-circle"></i>
                채널 발송
            </a>
            <a href="/admin/custAdmin" class="nav-item">
                <i class="ph ph-database"></i>
                데이터 관리
            </a>
            <a href="/admin/plannerAdmin" class="nav-item">
                <i class="ph ph-user-circle"></i>
                플래너 관리
            </a>
            <a href="/admin/templateAdmin" class="nav-item active">
                <i class="ph ph-chat-circle-text"></i>
                메세지 관리
            </a>
            <a href="/admin/send-stat" class="nav-item">
                <i class="ph ph-chart-bar"></i>
                오늘의 발송 현황
            </a>
        </nav>
        <div class="sidebar-footer">
            <a href="/admin/settings" class="admin-settings">
                <i class="ph ph-gear"></i>
                관리자 설정
            </a>
        </div>
    </aside>

    <div class="main-wrapper">

        <header>
            <div class="header-left">
                <span>데이터 관리 - 메세지 관리</span>
            </div>
            <div class="header-right">
                <div class="timer-wrapper" title="남은 세션 시간">
                    <i class="ph ph-clock"></i>
                    <span class="time-display" id="session-timer">60:00</span>
                    <button type="button" class="btn-extend" id="btn-extend">연장</button>
                </div>
                <div class="user-info">
                    <div class="avatar" th:text="${user.email != null ? user.email.substring(0,1).toUpperCase() : 'U'}">A</div>
                    <span th:text="${user.email}">admin@example.com</span>
                </div>
                <a href="/logout" class="btn-logout" title="로그아웃">
                    <i class="ph ph-sign-out"></i>
                    <span>로그아웃</span>
                </a>
            </div>
        </header>

        <main class="cust-main">

            <section class="action-bar">
                <div class="action-left">
                    <i class="ph-fill ph-chat-circle-text"></i>
                    <span>전체 템플릿: <strong id="total-count">0</strong>건</span>
                </div>
                <div class="action-right">
                    <button type="button" class="btn btn-outline" id="btn-download">
                        <i class="ph ph-file-arrow-down"></i> 엑셀 다운로드
                    </button>
                    <button type="button" class="btn btn-success" id="btn-add">
                        <i class="ph ph-plus-circle"></i> 템플릿 추가
                    </button>
                    <button type="button" class="btn btn-danger" id="btn-delete" disabled>
                        <i class="ph ph-trash"></i> 선택 삭제
                    </button>
                </div>
            </section>

            <section class="filter-pane">
                <div class="search-box">
                    <i class="ph ph-magnifying-glass"></i>
                    <input type="text" id="search-keyword" placeholder="템플릿명, 내용 검색..." />
                </div>
                <div class="filter-group">
                    <button type="button" class="btn btn-sm" id="btn-search">
                        <i class="ph ph-funnel"></i> 조회
                    </button>
                </div>
            </section>

            <section class="grid-wrapper">
                <div id="grid"></div>
            </section>

            <section class="paging-area">
                <div id="paging"></div>
            </section>

        </main>

        <footer>
            <p>&copy; 2026 보험 마케팅 관리자. All rights reserved.</p>
        </footer>
    </div>

    <!-- 템플릿 등록/수정 모달 -->
    <div class="modal-overlay" id="form-modal" style="display: none;">
        <div class="modal-container modal-md">
            <div class="modal-header">
                <h3 id="modal-title"><i class="ph ph-plus-circle"></i> 템플릿 추가</h3>
                <button type="button" class="modal-close" id="btn-form-close">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="form-template-id" value="" />
                <div class="form-group">
                    <label for="form-title">제목 (Title)</label>
                    <input type="text" id="form-title" class="form-control" placeholder="가입 축하 메시지" />
                </div>
                <div class="form-group">
                    <label for="form-category">카테고리</label>
                    <input type="text" id="form-category" class="form-control" placeholder="WELCOME" />
                </div>
                <div class="form-group">
                    <label for="form-content">내용 (Content)</label>
                    <textarea id="form-content" class="form-control" rows="5" placeholder="고객님의 가입을 진심으로 축하드립니다."></textarea>
                </div>
                <div class="form-group">
                    <label for="form-image">이미지 URL (선택)</label>
                    <input type="text" id="form-image" class="form-control" placeholder="https://example.com/image.jpg" />
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="form-active" checked /> 활성 (사용) 상태
                    </label>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline" id="btn-form-cancel">취소</button>
                <button type="button" class="btn btn-success" id="btn-form-save">
                    <i class="ph ph-check"></i> <span id="btn-save-text">등록</span>
                </button>
            </div>
        </div>
    </div>

    <script src="/js/common.js"></script>
    <script src="/js/templateAdmin.js"></script>
</body>
</html>
